<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>0416 letter - kali</title>
    <link rel="icon" href="/kali-icon.jpg">
    <link rel="stylesheet" href="041626.css">
</head>
<body>
    <div class="container">
        
        <div id="screen-letter" class="screen active">
            <img src="041626-letter.png" alt="Letter" style="max-width: 100%;">
            
            <audio id="bg-music" loop preload="auto">
                <source src="/songs/sparks.mp3" type="audio/mpeg">
            </audio>

            <br><br>
            <button class="btn-secondary" onclick="window.location.href='../../index.html'">go back</button>
        </div>

    </div>

    <script>
        window.onload = () => {
            const music = document.getElementById('bg-music');
            if (!music) return;

            // Try to autoplay (works on some Androids/Desktop)
            music.play().then(() => {
                let vol = 0;
                music.volume = 0;
                const fade = setInterval(() => {
                    if (vol < 1) {
                        vol += 0.02;
                        music.volume = Math.min(vol, 0.3);
                    } else {
                        clearInterval(fade);
                    }
                }, 100);
            }).catch(() => {
                // iPhone/Mobile strict block caught. 
                // We will play it the very first time she touches the screen to read/scroll.
                const startMusic = () => {
                    music.volume = 0.3; // Android/Desktop fallback (iOS ignores this anyway)
                    music.play();
                    
                    // Remove listeners so it doesn't try to restart on every tap
                    document.removeEventListener('touchstart', startMusic);
                    document.removeEventListener('click', startMusic);
                    document.removeEventListener('scroll', startMusic);
                };

                // Bind to every possible type of screen interaction
                document.addEventListener('touchstart', startMusic, { once: true });
                document.addEventListener('click', startMusic, { once: true });
                document.addEventListener('scroll', startMusic, { once: true });
            });
        };
    </script>
</body>
</html>
