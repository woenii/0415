<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>0415 letter - kali</title>
    <link rel="icon" href="kali-icon.jpg">
    <link rel="stylesheet" href="041526.css">
</head>
<body>
    <div class="container">
        
        <div id="screen-letter" class="screen active">
            <img src="/0415-letter.png" alt="Letter" style="max-width: 100%;">
            
            <audio id="bg-music" loop>
                <source src="/songs/sparks.mp3" type="audio/mpeg">
            </audio>

            <br><br>
            <button class="btn-secondary" onclick="window.location.href='../../previous-letters.html'">go back</button>
        </div>

    </div>

    <script>
        // Custom script just for the letter page to handle the music
        window.onload = () => {
            const music = document.getElementById('bg-music');
            if (!music) return;

            music.volume = 0;
            
            // Try to play and fade in automatically
            music.play().then(() => {
                let vol = 0;
                const fade = setInterval(() => {
                    if (vol < 1) {
                        vol += 0.02;
                        music.volume = Math.min(vol, 0.3);
                    } else {
                        clearInterval(fade);
                    }
                }, 100);
            }).catch(() => {
                // If browser blocks autoplay, play on her first tap/scroll
                document.addEventListener('click', () => {
                    music.volume = 0.3;
                    music.play();
                }, { once: true });
            });
        };
    </script>
</body>
</html>
