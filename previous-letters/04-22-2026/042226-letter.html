<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>0422 letter - kali</title>
    <link rel="icon" href="/kali-icon.jpg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="042226.css">
    <style>
        /* CSS just for the fade-out overlay */
        #start-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #fcf9f2; /* Match this to your main background color */
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: opacity 1.5s ease;
        }
        .tap-text {
            font-family: 'Playfair Display', serif;
            font-size: 1.2rem;
            color: #6b5b53;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { opacity: 0.6; }
            50% { opacity: 1; }
            100% { opacity: 0.6; }
        }
    </style>
</head>
<body>
    <div class="container">
        
        <div id="start-overlay">
            <p class="tap-text">tap to read</p>
        </div>

        <div id="screen-letter" class="screen active">
            <img src="042226-letter.png" alt="Letter" style="max-width: 100%;">
            
            <audio id="bg-music" loop>
                <source src="/songs/you'll be safe here.mp3" type="audio/mpeg">
            </audio>

            <br><br>
            <button class="btn-secondary" onclick="window.location.href='../../index.html'">go back</button>
        </div>

    </div>

    <script>
        window.onload = () => {
            const music = document.getElementById('bg-music');
            const overlay = document.getElementById('start-overlay');
            
            if (!music || !overlay) return;

            music.volume = 0;

            // Wait for the tap on the overlay
            overlay.addEventListener('click', () => {
                
                // 1. Play the music and fade it in
                music.play().then(() => {
                    let vol = 0;
                    const fade = setInterval(() => {
                        if (vol < 0.3) { // Caps out at 0.3 volume
                            vol += 0.02;
                            music.volume = Math.min(vol, 0.3);
                        } else {
                            clearInterval(fade);
                        }
                    }, 100);
                }).catch((e) => console.log("Audio play failed:", e));

                // 2. Fade out the overlay to reveal the letter
                overlay.style.opacity = '0';
                
                // 3. Remove the overlay from the DOM after the fade transition finishes
                setTimeout(() => {
                    overlay.style.display = 'none';
                }, 1500); 
            });
        };
    </script>
</body>
</html>
