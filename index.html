<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>home - kali</title>
    <link rel="icon" href="kali-icon.jpg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        
        <div id="screen-home" class="screen active">
            <h3>which one would you like to read, my kali?</h3>
            
            <button onclick="goToTodaysLetter()">today's letter</button>
            
            <button class="btn-secondary" onclick="window.location.href='previous-letters.html'">previous ones</button>
        </div>

    </div>
    <div id="animation-modal" class="modal-overlay hidden">
    <div class="modal-content">
        <button class="modal-close" onclick="closeModal()">✕</button>

        <h3 id="modal-title"><br>do you want to play the animation for this letter?</h3>

        <div id="modal-actions">
            <button onclick="playWithAnimation()">yes, please</button>
            <button class="btn-secondary" onclick="skipAnimation()">no, just the letter</button>
        </div>
    </div>
</div>

    <script src="script.js"></script>
</body>
</html>
