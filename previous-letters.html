<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>previous letters - kali</title>
    <link rel="icon" href="kali-icon.jpg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        
        <div id="screen-previous" class="screen active">
            <h2>previous letters</h2>
            
            <div class="carousel-container">
                
                <button class="arrow-btn" onclick="prevLetter()">&#10094;</button>

                <div class="letters-list" id="all-letters">
                    
                    <div class="envelope-wrapper carousel-item" data-date="041526" onclick="handleEnvelopeClick('04-15-2026', '041526')">
                        <img src="/previous-letters/04-15-2026/041526-letter-cover.png" alt="041526 Letter" class="custom-envelope">
                        <p class="tap-hint">tap to open 04/15/26</p>
                    </div>

                    <div class="envelope-wrapper carousel-item" data-date="041626" onclick="handleEnvelopeClick('04-16-2026', '041626')">
                        <img src="/previous-letters/04-16-2026/041626-letter-cover.png" alt="041626 Letter" class="custom-envelope">
                        <p class="tap-hint">tap to open 04/16/26</p>
                    </div>

                    <div class="envelope-wrapper carousel-item" data-date="041726" onclick="handleEnvelopeClick('04-17-2026', '041726')">
                        <img src="/previous-letters/04-17-2026/041726-letter-cover.png" alt="041726 Letter" class="custom-envelope">
                        <p class="tap-hint">tap to open 04/17/26</p>
                    </div>

                    <div class="envelope-wrapper carousel-item" data-date="041826" onclick="handleEnvelopeClick('04-18-2026', '041826')">
                        <img src="/previous-letters/04-18-2026/041826-letter-cover.png" alt="041826 Letter" class="custom-envelope">
                        <p class="tap-hint">tap to open 04/18/26</p>
                    </div>

                    <div class="envelope-wrapper carousel-item" data-date="041826" onclick="handleEnvelopeClick('04-19-2026', '041926')">
                        <img src="/previous-letters/04-19-2026/041926-letter-cover.png" alt="041926 Letter" class="custom-envelope">
                        <p class="tap-hint">tap to open 04/19/26</p>
                    </div>

                    <div class="envelope-wrapper carousel-item" data-date="042026" onclick="handleEnvelopeClick('04-20-2026', '042026')">
                        <img src="/previous-letters/04-20-2026/041926-letter-cover.png" alt="042026 Letter" class="custom-envelope">
                        <p class="tap-hint">tap to open 04/20/26</p>
                    </div>

                </div>

                <button class="arrow-btn" onclick="nextLetter()">&#10095;</button>
                
            </div>

            <br>
            <button class="btn-secondary" onclick="window.location.href='index.html'">go back</button>
        </div>

    </div>

    <div id="animation-modal" class="modal-overlay hidden">
        <div class="modal-content">
            <button class="modal-close" onclick="closeModal()">✕</button>
            
            <h3><br>do you want to play the animation for this letter?</h3>
            <button onclick="playWithAnimation()">yes, please</button>
            <button class="btn-secondary" onclick="skipAnimation()">no, just the letter</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
