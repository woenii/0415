<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>previous letters - kali</title>

    <link rel="icon" href="kali-icon.jpg">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="container">
    <div id="screen-previous" class="screen active">
        <h2>previous letters</h2>

        <div class="carousel-container">
            <button class="arrow-btn" onclick="prevLetter()">&#10094;</button>

            <!-- EMPTY: JS FILLS THIS -->
            <div class="letters-list" id="all-letters"></div>

            <button class="arrow-btn" onclick="nextLetter()">&#10095;</button>
        </div>

        <br>
        <button class="btn-secondary" onclick="window.location.href='index.html'">
            go back
        </button>
    </div>
</div>

<!-- MODAL -->
<div id="animation-modal" class="modal-overlay hidden">
    <div class="modal-content">
        <button class="modal-close" onclick="closeModal()">✕</button>
        <h3><br>do you want to play the animation for this letter?</h3>
        <button onclick="playWithAnimation()">yes, please</button>
        <button class="btn-secondary" onclick="skipAnimation()">no, just the letter</button>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
